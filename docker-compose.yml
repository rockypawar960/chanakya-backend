version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chanakya-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chanakya_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - chanakya-network

  backend:
    build: .
    container_name: chanakya-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chanakya_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: my-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-security-purposes
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chanakya-network

volumes:
  mysql_data:

networks:
  chanakya-network:
    driver: bridge
