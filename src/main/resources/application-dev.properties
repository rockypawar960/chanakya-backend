# MySQL Database Configuration (Development)
spring.datasource.url=jdbc:mysql://localhost:3306/chanakya_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Aj@y1980#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.root=INFO
logging.level.com.chanakya=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=my-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-security-purposes
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# CORS Configuration - IMPORTANT!
# Ye properties Spring Boot 2.7+ aur 3.x ke liye
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origins=http://localhost:8081,http://localhost:5173,http://localhost:3000,http://127.0.0.1:8081
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
spring.web.cors.exposed-headers=Authorization,Content-Disposition
spring.web.cors.max-age=3600

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
